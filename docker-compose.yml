name: synapse

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: synapse-postgres
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    ports:
      - "5432:5432"
    volumes:
      - synapse_pg_data:/var/lib/postgresql/data
      - ./infra/db/extensions.sql:/docker-entrypoint-initdb.d/001-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - synapse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: synapse-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/migrations:/migrations:ro
    entrypoint: ["migrate"]
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: synapse-api-gateway
    environment:
      APP_ENV: "${APP_ENV:-dev}"
      HTTP_PORT: "${HTTP_PORT:-8080}"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in .env}"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      AI_GENERATION_PROVIDER: "${AI_GENERATION_PROVIDER:-anthropic}"
      AI_EMBEDDING_PROVIDER: "${AI_EMBEDDING_PROVIDER:-openai}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-}"
      GEMINI_EMBEDDING_MODEL: "${GEMINI_EMBEDDING_MODEL:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
       - "8080:8080"

  lms-service:
    build:
      context: .
      dockerfile: services/lms-service/Dockerfile
    container_name: synapse-lms-service
    environment:
      APP_ENV: "${APP_ENV:-dev}"
      HTTP_PORT: "8081"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in .env}"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      CANVAS_CLIENT_ID: "${CANVAS_CLIENT_ID:-dev_client_id}"
      CANVAS_CLIENT_SECRET: "${CANVAS_CLIENT_SECRET:-dev_secret}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:4200}"
      CANVAS_REDIRECT_URI: "${CANVAS_REDIRECT_URI:-http://localhost:8081/v1/lms/callback/canvas}"
      CANVAS_INTERNAL_URL: "${CANVAS_INTERNAL_URL:-http://mock-canvas:8082}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"

  mock-canvas:
    build:
      context: .
      dockerfile: services/mock-canvas/Dockerfile
    container_name: synapse-mock-canvas
    environment:
      HTTP_PORT: "8082"
    ports:
      - "8082:8082"

volumes:
  synapse_pg_data:
  synapse_redis_data: