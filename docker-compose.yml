name: synapse

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: synapse-postgres
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    ports:
      - "5432:5432"
    volumes:
      - synapse_pg_data:/var/lib/postgresql/data
      - ./infra/db/extensions.sql:/docker-entrypoint-initdb.d/001-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - synapse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: synapse-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/migrations:/migrations:ro
    entrypoint: ["migrate"]

volumes:
  synapse_pg_data:
  synapse_redis_data: