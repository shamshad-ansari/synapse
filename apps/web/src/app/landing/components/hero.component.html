<section class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden bg-white">
  <!-- Dotted Background Pattern -->
  <div
    class="absolute inset-0 z-0 pointer-events-none"
    [ngStyle]="dottedBgStyle"
  ></div>

  <!-- Glowing Background SVG on top of dots -->
  <div
    class="absolute inset-0 z-[1] pointer-events-none opacity-90 mix-blend-multiply"
    [ngStyle]="glowBgStyle"
  ></div>

  <div class="container relative z-10 px-6 mx-auto max-w-7xl flex flex-col items-center text-center -mt-16">

    <!-- Logo -->
    <div class="flex justify-center w-full mb-8">
      <img [src]="logoImage" alt="Synapse Logo" class="w-15 h-15 object-contain" />
    </div>

    <!-- Headline -->
    <h1 class="max-w-4xl mb-6 text-6xl md:text-[5.5rem] font-bold tracking-tight text-slate-900 font-['Bricolage_Grotesque'] leading-[1.05]">
      Network-Aware <br />
      <span class="inline-block mt-2">Intelligence</span>
    </h1>

    <!-- Stylized accent word -->
    <div
      class="mb-10 text-[5.5rem] md:text-[7rem] font-medium leading-[0.8] text-[#ebd45b] -mt-4 transform -rotate-2"
      [ngStyle]="masteryFontStyle"
    >
      Mastery
    </div>

    <!-- Subheadline -->
    <p class="max-w-xl mb-12 text-lg md:text-[1.1rem] text-slate-500 font-['Inter'] font-normal leading-relaxed">
      Model individual mastery and collective confusion. <br class="hidden md:block" /> AI-powered learning optimization made simple.
    </p>

    <!-- CTA -->
    <button class="group inline-flex items-center justify-center gap-3 px-8 py-3.5 bg-slate-900 text-white rounded-full font-['Inter'] font-semibold text-[15px] transition-all hover:bg-slate-800 shadow-[0_4px_20px_-2px_rgba(0,0,0,0.05)] hover:-translate-y-0.5 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-900 focus-visible:ring-offset-2 active:translate-y-0">
      <span class="text-lg tracking-tight">Get Started</span>
      <lucide-icon [img]="ArrowRight" [size]="16" [strokeWidth]="1.5"></lucide-icon>
    </button>

    <!-- Secondary CTA -->
    <a href="#how-it-works"
       class="mt-5 inline-block"
       style="font-size: 13.5px; color: var(--ink-muted); text-decoration: none; cursor: pointer">
      See how it works &darr;
    </a>

  </div>
</section>
